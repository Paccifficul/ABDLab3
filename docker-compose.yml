services:
  postgres:
    image: postgres:17
    container_name: abdlab3-postgres
    environment:
      POSTGRES_USER: hahaha
      POSTGRES_PASSWORD: hohoho
      POSTGRES_DB: abd_lab3
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d abd_lab3"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - abdlab3-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: abdlab3-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - abdlab3-net

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: abdlab3-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 20
    networks:
      - abdlab3-net

  jobmanager:
    build:
      context: ./flink
      dockerfile: Dockerfile
    container_name: abdlab3-flink-jobmanager
    command: jobmanager
    ports:
      - "8081:8081"
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        rest.address: jobmanager
        parallelism.default: 2
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/overview >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - abdlab3-net

  taskmanager:
    build:
      context: ./flink
      dockerfile: Dockerfile
    container_name: abdlab3-flink-taskmanager
    command: taskmanager
    depends_on:
      jobmanager:
        condition: service_healthy
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 4
        parallelism.default: 2
    networks:
      - abdlab3-net

  flink-sql-client:
    build:
      context: ./flink
      dockerfile: Dockerfile
    container_name: abdlab3-flink-sql-client
    depends_on:
      jobmanager:
        condition: service_healthy
      taskmanager:
        condition: service_started
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./flink/job.sql:/opt/flink/usrlib/job.sql:ro
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        rest.address: jobmanager
    command: ["/opt/flink/bin/sql-client.sh", "-f", "/opt/flink/usrlib/job.sql"]
    networks:
      - abdlab3-net
    restart: "no"

  producer:
    build:
      context: ./src/ABDLab3.Producer
      dockerfile: Dockerfile
    container_name: abdlab3-producer
    depends_on:
      kafka:
        condition: service_healthy
      flink-sql-client:
        condition: service_started
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC: sales
      DATA_DIR: /data
      PRODUCER_DELAY_MS: 2
    volumes:
      - ./исходные данные:/data:ro
    networks:
      - abdlab3-net
    restart: "no"

networks:
  abdlab3-net:
    driver: bridge

volumes:
  pgdata:
